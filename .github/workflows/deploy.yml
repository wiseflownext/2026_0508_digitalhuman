name: Build & Deploy

on:
  push:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./server
          push: false
          tags: |
            ghcr.io/wiseflownext/digitalhuman:latest
            ghcr.io/wiseflownext/digitalhuman:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run smoke test
        run: |
          docker run -d --name smoke-test \
            -e ARK_API_KEY=test \
            -e ARK_SEEDANCE_ENDPOINT=test \
            ghcr.io/wiseflownext/digitalhuman:${{ github.sha }}
          sleep 5
          HTTP_CODE=$(docker exec smoke-test curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/api/health || echo "000")
          docker rm -f smoke-test
          echo "Smoke test HTTP: $HTTP_CODE"
          if [ "$HTTP_CODE" != "200" ]; then exit 1; fi

      - name: Prepare deploy package
        run: |
          # 注入 secrets 到 backend.env
          sed -i "s/__ARK_API_KEY__/${{ secrets.ARK_API_KEY }}/" server/backend.env
          sed -i "s/__ARK_SEEDANCE_ENDPOINT__/${{ secrets.ARK_SEEDANCE_ENDPOINT }}/" server/backend.env
          sed -i "s/__OSS_ACCESS_KEY_ID__/${{ secrets.OSS_ACCESS_KEY_ID }}/" server/backend.env
          sed -i "s/__OSS_ACCESS_KEY_SECRET__/${{ secrets.OSS_ACCESS_KEY_SECRET }}/" server/backend.env
          # 打包（排除 .git 和大文件）
          tar -czf /tmp/digitalhuman-deploy.tar.gz \
            --exclude='.git' \
            --exclude='*.db' \
            --exclude='__pycache__' \
            -C server .
          echo "PACKAGE_SIZE=$(wc -c < /tmp/digitalhuman-deploy.tar.gz)" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: digitalhuman-deploy
          path: /tmp/digitalhuman-deploy.tar.gz
          retention-days: 1

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: digitalhuman-deploy
          path: /tmp/

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ubuntu
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          script: |
            set -e
            # 解压到部署目录
            sudo mkdir -p /opt/digitalhuman/server
            sudo tar -xzf /tmp/digitalhuman-deploy.tar.gz -C /opt/digitalhuman/server/
            sudo chown -R ubuntu:ubuntu /opt/digitalhuman/server/
            chmod +x /opt/digitalhuman/server/deploy.sh
            chmod +x /opt/digitalhuman/server/rollback.sh
            # 执行部署
            cd /opt/digitalhuman/server
            bash deploy.sh
